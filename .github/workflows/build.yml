name: Build Desktop App

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

jobs:
  build:
    # PR이 머지됨 + deploy 라벨이 있을 때만 실행 (또는 수동 실행)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          # 공증 테스트 완료 후 복원
          # - os: windows-latest
          #   platform: win
          # - os: ubuntu-latest
          #   platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}

      # CI에서는 상위 workspace root가 없어 standalone 출력이 flat 구조로 생성됨
      # electron-builder.yml이 기대하는 nested 구조(hiveworks/hive-talk-desktop-app/)로 변환
      - name: Normalize standalone structure
        shell: bash
        run: |
          if [ -f ".next/standalone/server.js" ]; then
            echo "Flat standalone detected — restructuring to nested layout..."
            NESTED=".next/standalone/hiveworks/hive-talk-desktop-app"
            mkdir -p "$NESTED"
            shopt -s dotglob
            for item in .next/standalone/*; do
              [ "$(basename "$item")" = "hiveworks" ] && continue
              mv "$item" "$NESTED/"
            done
            echo "Done. server.js is now at $NESTED/server.js"
          else
            echo "Nested standalone structure detected — no changes needed."
          fi

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      # 1) 서명/공증 없이 .app만 생성
      - name: Build Electron app (unsigned)
        run: npx electron-builder --${{ matrix.platform }}
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # 2) Mac만: 수동 서명 + 공증
      - name: Sign and Notarize (macOS)
        if: matrix.platform == 'mac'
        timeout-minutes: 45
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          # 인증서 임포트
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"

          echo "$CSC_LINK" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12

          # 서명할 Identity 확인
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | grep -o '"[^"]*"' | tr -d '"')
          echo "Signing with: $IDENTITY"

          # .app 경로 찾기
          APP_PATH=$(find release -name "*.app" -maxdepth 2 | head -1)
          echo "App path: $APP_PATH"

          # Entitlements 경로
          ENTITLEMENTS="resources/entitlements.mac.plist"

          # 1) 모든 Mach-O 바이너리 찾아서 개별 서명 (안에서 바깥으로)
          echo "=== Signing all Mach-O binaries ==="
          find "$APP_PATH" -type f | while read f; do
            if file "$f" | grep -q "Mach-O"; then
              echo "  signing: $f"
              codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$f"
            fi
          done

          # 2) Framework 번들 서명
          echo "=== Signing frameworks ==="
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -maxdepth 1 2>/dev/null | while read f; do
            echo "  signing framework: $f"
            codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$f"
          done

          # 3) Helper 앱 서명
          echo "=== Signing helpers ==="
          find "$APP_PATH" -name "*.app" -not -path "$APP_PATH" | while read f; do
            echo "  signing helper: $f"
            codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$f"
          done

          # 4) 메인 앱 서명
          echo "=== Signing main app ==="
          codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH"
          echo "=== Codesign complete ==="

          # 서명 확인
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "=== Verification complete ==="

          # .app을 ZIP으로 압축하여 공증 (DMG보다 빠름)
          echo "=== Creating ZIP for notarization ==="
          cd release/mac-arm64
          zip -r -y ../HiveTalk-notarize.zip "HiveTalk.app"
          cd ../..
          echo "=== ZIP created ==="

          # 공증 (ZIP 제출)
          echo "=== Starting notarization ==="
          xcrun notarytool submit release/HiveTalk-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 20m 2>&1 | tee notary_output.txt || true

          # submission ID 추출
          SUB_ID=$(grep -o '[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}' notary_output.txt | head -1)
          echo "Submission ID: $SUB_ID"

          # 공증 상세 로그 출력
          echo "=== Fetching notarization log ==="
          xcrun notarytool log "$SUB_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" developer_log.json 2>&1 || true
          cat developer_log.json 2>/dev/null || echo "No log file"

          # Invalid 또는 Timeout이면 실패 처리
          if grep -q "Invalid\|Timeout" notary_output.txt; then
            echo "=== Notarization FAILED ==="
            exit 1
          fi

          echo "=== Notarization complete ==="

          # Staple (.app에 직접 붙임)
          xcrun stapler staple "$APP_PATH"
          echo "=== Staple complete ==="

          # Staple된 .app으로 설치용 DMG 생성 (create-dmg 사용)
          echo "=== Creating final DMG ==="
          npx create-dmg "$APP_PATH" release/ || true
          # create-dmg는 자동으로 앱 이름으로 DMG를 생성함
          # 파일명을 통일
          DMG_CREATED=$(find release -name "*.dmg" -maxdepth 1 | head -1)
          if [ -n "$DMG_CREATED" ]; then
            mv "$DMG_CREATED" "release/HiveTalk-arm64.dmg"
          fi
          codesign --force --timestamp --sign "$IDENTITY" "release/HiveTalk-arm64.dmg"
          echo "=== DMG created ==="

          # 임시 ZIP 삭제
          rm -f release/HiveTalk-notarize.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HiveTalk-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.yml

  # 빌드 완료 후 GitHub Releases에 설치 파일 자동 업로드
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          TAG="v$VERSION"

          # 같은 버전의 기존 Release가 있으면 삭제 후 재생성
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          # 설치 파일만 수집 (yml 메타데이터 제외)
          FILES=$(find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \))

          # Release 생성 + 설치 파일 업로드
          gh release create "$TAG" $FILES \
            --title "$TAG" \
            --notes ""
