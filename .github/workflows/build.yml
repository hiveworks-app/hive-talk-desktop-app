name: Build Desktop App

on:
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:

jobs:
  build:
    # PR이 머지됨 + deploy 라벨이 있을 때만 실행 (또는 수동 실행)
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}

      # CI에서는 상위 workspace root가 없어 standalone 출력이 flat 구조로 생성됨
      # electron-builder.yml이 기대하는 nested 구조(hiveworks/hive-talk-desktop-app/)로 변환
      - name: Normalize standalone structure
        shell: bash
        run: |
          if [ -f ".next/standalone/server.js" ]; then
            echo "Flat standalone detected — restructuring to nested layout..."
            NESTED=".next/standalone/hiveworks/hive-talk-desktop-app"
            mkdir -p "$NESTED"
            shopt -s dotglob
            for item in .next/standalone/*; do
              [ "$(basename "$item")" = "hiveworks" ] && continue
              mv "$item" "$NESTED/"
            done
            echo "Done. server.js is now at $NESTED/server.js"
          else
            echo "Nested standalone structure detected — no changes needed."
          fi

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      # 1) 서명/공증 없이 .app만 생성
      - name: Build Electron app (unsigned)
        run: npx electron-builder --${{ matrix.platform }}
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # 2) Mac만: 수동 서명 + 공증
      - name: Sign and Notarize (macOS)
        if: matrix.platform == 'mac'
        timeout-minutes: 45
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          # 인증서 임포트
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"

          echo "$CSC_LINK" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12

          # 서명할 Identity 확인
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | grep -o '"[^"]*"' | tr -d '"')
          echo "Signing with: $IDENTITY"

          ENTITLEMENTS="resources/entitlements.mac.plist"

          # electron-builder가 생성한 기존 DMG 삭제 (서명 안 된 DMG)
          find release -name "*.dmg" -maxdepth 1 -delete 2>/dev/null || true

          # 각 아키텍처별 .app을 순회하며 서명 + 공증 + DMG 생성
          for APP_PATH in release/mac-*/HiveTalk.app; do
            ARCH_DIR=$(basename "$(dirname "$APP_PATH")")
            ARCH=$(echo "$ARCH_DIR" | sed 's/mac-//')
            echo ""
            echo "========================================="
            echo "Processing: $ARCH ($APP_PATH)"
            echo "========================================="

            # 1) 모든 Mach-O 바이너리 개별 서명
            echo "=== Signing all Mach-O binaries ($ARCH) ==="
            find "$APP_PATH" -type f | while read f; do
              if file "$f" | grep -q "Mach-O"; then
                echo "  signing: $f"
                codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$f"
              fi
            done

            # 2) Framework 번들 서명
            find "$APP_PATH/Contents/Frameworks" -name "*.framework" -maxdepth 1 2>/dev/null | while read f; do
              codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$f"
            done

            # 3) Helper 앱 서명
            find "$APP_PATH" -name "*.app" -not -path "$APP_PATH" | while read f; do
              codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$f"
            done

            # 4) 메인 앱 서명
            codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" --sign "$IDENTITY" "$APP_PATH"
            echo "=== Codesign complete ($ARCH) ==="

            # 서명 확인
            codesign --verify --deep --strict "$APP_PATH"
            echo "=== Verification passed ($ARCH) ==="

            # ZIP으로 공증
            echo "=== Notarizing ($ARCH) ==="
            cd "release/$ARCH_DIR"
            zip -r -y -q "../HiveTalk-notarize-$ARCH.zip" "HiveTalk.app"
            cd ../..

            xcrun notarytool submit "release/HiveTalk-notarize-$ARCH.zip" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 20m 2>&1 | tee notary_output.txt || true

            # 공증 로그 확인
            SUB_ID=$(grep -o '[0-9a-f]\{8\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{4\}-[0-9a-f]\{12\}' notary_output.txt | head -1)
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" developer_log.json 2>&1 || true
            cat developer_log.json 2>/dev/null || true

            if grep -q "Invalid\|Timeout" notary_output.txt; then
              echo "=== Notarization FAILED ($ARCH) ==="
              exit 1
            fi
            echo "=== Notarization complete ($ARCH) ==="

            # Staple
            xcrun stapler staple "$APP_PATH"
            echo "=== Staple complete ($ARCH) ==="

            # DMG 생성
            echo "=== Creating DMG ($ARCH) ==="
            npx create-dmg "$APP_PATH" release/ || true
            DMG_CREATED=$(find release -maxdepth 1 -name "HiveTalk*.dmg" -newer "$APP_PATH" | head -1)
            if [ -n "$DMG_CREATED" ]; then
              mv "$DMG_CREATED" "release/HiveTalk-$ARCH.dmg"
            fi
            codesign --force --timestamp --sign "$IDENTITY" "release/HiveTalk-$ARCH.dmg"
            echo "=== DMG created: HiveTalk-$ARCH.dmg ==="

            # 임시 파일 정리
            rm -f "release/HiveTalk-notarize-$ARCH.zip" notary_output.txt developer_log.json
          done

          echo ""
          echo "=== All architectures processed ==="
          ls -la release/*.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HiveTalk-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.yml

  # 빌드 완료 후 GitHub Releases에 설치 파일 자동 업로드
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          TAG="v$VERSION"

          # 같은 버전의 기존 Release가 있으면 삭제 후 재생성
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

          # 설치 파일 + electron-updater 메타데이터 (latest*.yml) 수집
          FILES=$(find artifacts -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "latest*.yml" \))

          # Release 생성 + 설치 파일 업로드
          gh release create "$TAG" $FILES \
            --title "$TAG" \
            --notes-file .github/RELEASE_NOTES.md
