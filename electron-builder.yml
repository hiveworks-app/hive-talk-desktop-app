appId: com.hiveworks.hivetalk
productName: HiveTalk
artifactName: "${productName}-${arch}.${ext}"
copyright: Copyright (c) 2026 Hiveworks

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - "!node_modules"
  - "!src"
  - "!electron"
  - "!.next"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/hiveworks/hive-talk-desktop-app/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/hiveworks/hive-talk-desktop-app/public
    filter:
      - "**/*"
  - from: resources
    to: .
    filter:
      - "icon.*"
      - "trayIconTemplate*.png"
      - "notification-profile-default.png"

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.social-networking
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  # CI에서는 수동 서명/공증 (build.yml에서 처리)
  identity: null

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Network
  icon: resources/icon.png
