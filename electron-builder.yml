appId: com.hiveworks.hivetalk
productName: HiveTalk
artifactName: "${productName}-${version}-${arch}.${ext}"
copyright: Copyright (c) 2026 Hiveworks

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - "!node_modules"
  - "!src"
  - "!electron"
  - "!.next"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/hiveworks-web/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/hiveworks-web/public
    filter:
      - "**/*"
  - from: resources
    to: .
    filter:
      - "icon.*"

mac:
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.social-networking
  icon: resources/icon.icns

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Network
  icon: resources/icon.png
