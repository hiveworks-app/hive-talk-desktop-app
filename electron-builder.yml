appId: com.hiveworks.hivetalk
productName: HiveTalk
artifactName: "${productName}-${arch}.${ext}"
copyright: Copyright (c) 2026 Hiveworks

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - "!node_modules"
  - "!src"
  - "!electron"
  - "!.next"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/hiveworks/hive-talk-desktop-app/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/hiveworks/hive-talk-desktop-app/public
    filter:
      - "**/*"
  - from: resources
    to: .
    filter:
      - "icon.*"

mac:
  target:
    - target: dmg
      arch: [arm64]  # 공증 테스트 완료 후 [arm64, x64]로 복원
  category: public.app-category.social-networking
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize:
    teamId: ${env.APPLE_TEAM_ID}

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Network
  icon: resources/icon.png
