appId: com.hiveworks.hivetalk
productName: HiveTalk
artifactName: "${productName}-${arch}.${ext}"
copyright: Copyright (c) 2026 Hiveworks

publish:
  provider: github
  owner: hiveworks-app
  repo: hive-talk-desktop-app

directories:
  output: release
  buildResources: resources

files:
  - dist-electron/**/*
  - "!node_modules"
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
  - node_modules/fs-extra/**/*
  - node_modules/jsonfile/**/*
  - node_modules/universalify/**/*
  - node_modules/graceful-fs/**/*
  - node_modules/js-yaml/**/*
  - node_modules/argparse/**/*
  - node_modules/lazy-val/**/*
  - node_modules/lodash.escaperegexp/**/*
  - node_modules/lodash.isequal/**/*
  - node_modules/semver/**/*
  - node_modules/tiny-typed-emitter/**/*
  - node_modules/debug/**/*
  - node_modules/ms/**/*
  - node_modules/sax/**/*
  - "!src"
  - "!electron"
  - "!.next"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
  - from: .next/static
    to: standalone/hiveworks/hive-talk-desktop-app/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/hiveworks/hive-talk-desktop-app/public
    filter:
      - "**/*"
  - from: resources
    to: .
    filter:
      - "icon.*"
      - "trayIconTemplate*.png"
      - "notification-profile-default.png"

dmg:
  icon: resources/icon.icns
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 200
    - x: 400
      y: 200
      type: link
      path: /Applications

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.social-networking
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  # CI에서는 수동 서명/공증 (build.yml에서 처리)
  identity: null

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Network
  icon: resources/icon.png
