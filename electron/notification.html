<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HiveTalk Notification</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  .notification {
    width: 360px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
    overflow: hidden;
    cursor: pointer;
    opacity: 0;
    transform: translateX(20px);
    animation: slideIn 0.3s ease-out forwards;
  }

  .notification.fade-out {
    animation: fadeOut 0.3s ease-in forwards;
  }

  @keyframes slideIn {
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(20px); }
  }

  /* 헤더: 로고 + HiveTalk + 닫기 */
  .header {
    display: flex;
    align-items: center;
    padding: 10px 14px 0 14px;
  }

  .header-logo {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    flex-shrink: 0;
    object-fit: contain;
  }

  .header-title {
    font-size: 11px;
    font-weight: 600;
    color: #9CA3AF;
    margin-left: 6px;
    flex: 1;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .read-btn {
    height: 20px;
    padding: 0 8px;
    border: 1px solid #D1D5DB;
    background: transparent;
    color: #6B7280;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 4px;
    line-height: 1;
  }

  .read-btn:hover {
    background: #F3F4F6;
    color: #374151;
    border-color: #9CA3AF;
  }

  .close-btn {
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    color: #9CA3AF;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    line-height: 1;
    flex-shrink: 0;
  }

  .close-btn:hover {
    background: #F3F4F6;
    color: #6B7280;
  }

  /* 본문: 프로필 + 텍스트 */
  .body {
    display: flex;
    align-items: center;
    padding: 10px 14px 14px 14px;
    gap: 12px;
  }

  .profile-img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #E5E7EB;
    flex-shrink: 0;
    object-fit: cover;
  }

  .text-area {
    flex: 1;
    min-width: 0;
  }

  .sender-name {
    font-size: 14px;
    font-weight: 600;
    color: #111827;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .message-text {
    font-size: 13px;
    color: #6B7280;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>
  <div class="notification" id="notification">
    <div class="header">
      <img class="header-logo" id="appIcon" src="" alt="H" />
      <span class="header-title">HiveTalk</span>
      <div class="header-actions">
        <button class="read-btn" id="readBtn">읽음</button>
        <button class="close-btn" id="closeBtn">&times;</button>
      </div>
    </div>
    <div class="body">
      <img class="profile-img" id="profileImg" src="" alt="" />
      <div class="text-area">
        <div class="sender-name" id="senderName"></div>
        <div class="message-text" id="messageText"></div>
      </div>
    </div>
  </div>

  <script>
    const notification = document.getElementById('notification');
    const appIcon = document.getElementById('appIcon');
    const profileImg = document.getElementById('profileImg');
    const senderName = document.getElementById('senderName');
    const messageText = document.getElementById('messageText');
    const readBtn = document.getElementById('readBtn');
    const closeBtn = document.getElementById('closeBtn');

    // 기본 프로필 이미지 (SVG data URI)
    const DEFAULT_PROFILE = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44">' +
      '<rect width="44" height="44" rx="22" fill="#E5E7EB"/>' +
      '<text x="22" y="27" text-anchor="middle" font-size="18" fill="#9CA3AF">?</text>' +
      '</svg>'
    );

    // 데이터 수신
    window.notificationAPI.onData((data) => {
      senderName.textContent = data.title || '알 수 없음';
      messageText.textContent = data.body || '';

      if (data.appIconUrl) {
        appIcon.src = data.appIconUrl;
      }

      if (data.profileImageUrl) {
        profileImg.src = data.profileImageUrl;
        profileImg.onerror = () => { profileImg.src = DEFAULT_PROFILE; };
      } else {
        profileImg.src = DEFAULT_PROFILE;
      }
    });

    // 클릭 → 채팅방 이동
    notification.addEventListener('click', (e) => {
      if (e.target === closeBtn || e.target === readBtn) return;
      window.notificationAPI.click();
    });

    // 읽음 버튼
    readBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      notification.classList.add('fade-out');
      setTimeout(() => window.notificationAPI.read(), 300);
    });

    // 닫기 버튼
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      notification.classList.add('fade-out');
      setTimeout(() => window.notificationAPI.close(), 300);
    });
  </script>
</body>
</html>
